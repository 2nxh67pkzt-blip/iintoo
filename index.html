<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IIntoo</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="hero">
      <div class="background">
        <img src="./img/bg.jpg" alt="iintoo background" />
        <img class="logo" src="./img/logo.svg" alt="iintoo logo" />
      </div>

      <form>
        <div class="form-head">
          <h2>Get iintoo it today</h2>
          <div>There is no change or obligation upon registration</div>
        </div>

        <div class="form-bttn">
          <button class="fb-bttn" type="button" src="#">
            <img class="fb-img" src="./img/facebook.svg" /> Register with
            Facebook
          </button>

          <button class="l-bttn" type="button">
            <img class="l-img" src="./img/linkedin.svg" /> Register with
            Linkedln
          </button>
        </div>

        <div class="or">
          <span>OR</span>
        </div>

        <div class="user-data">
          <div class="email">
            <label for="email">Email</label>
            <input type="email" name="Email" id="email" autocomplete="none" required />
          </div>

          <div class="phone">
            <label for="phone">Phone</label>
            <input type="text" name="phone" id="phone" autocomplete="new-password" required />
          </div>
        </div>

        <div class="form-with-radio">
          <div class="head">
            <h2>What type of investor are you?</h2>
          <span>Select the type of investor you are below</span>
          </div>
          <div class="radios">
            <div class="radio1">
              <input type="radio" name="q" id="Individual" />
              <label for="Individual">
                Individual
                <div class="hide-hint">
                  <span class="hint"
                  >I am a naural person investing on my own behalf as a sole
                  owner, joint tenant, or tenant in common</span
                >
                </div>
              </label>
            </div>

            <div class="radio2">
              <input type="radio" name="q" id="business" />
              <label for="business"
                >Business
                <div class="hide-hint">
                  <span class="hint"
                  >I am a naural person investing on my own behalf as a sole
                  owner, joint tenant, or tenant in common</span
                >
                </div>
              </label>
            </div>

            <div class="radio3">
              <input type="radio" name="q" id="ira" />
              <label for="ira"
                >IRA
                <div class="hide-hint">
                  <span class="hint"
                  >I am a naural person investing on my own behalf as a sole
                  owner, joint tenant, or tenant in common</span
                >
                </div>
              </label>
            </div>

            <div class="radio4">
              <input type="radio" name="q" id="trust" />
              <label for="trust"
                >Trust
                <div class="hide-hint">
                  <span class="hint"
                  >I am a naural person investing on my own behalf as a sole
                  owner, joint tenant, or tenant in common</span
                >
                </div>
              </label>
            </div>
          </div>

          <div class="ca-bttn">
            <button type="submit">Create Account</button>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
